<!doctype html>
<!--
  Throwaway test page for the InstaPay window.upi provider (Phase 3 verification).
  NOT part of the extension bundle. Serve over http://localhost with any static
  server, e.g.:  npx serve .   (from the web-demo folder)   then open /test-dapp.html
  Phase 4 replaces this with the real merchant checkout + SDK.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InstaPay dApp Test</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; background:#0b0b0d; color:#eee; }
      h1 { font-size: 20px; }
      button { padding: 10px 16px; border-radius: 10px; border: 1px solid #333; background:#1b1d22; color:#fff; cursor:pointer; margin: 4px 6px 4px 0; }
      button:hover { background:#26282e; }
      input { padding: 8px 10px; border-radius: 8px; border:1px solid #333; background:#111; color:#fff; margin: 4px 0; }
      pre { background:#111; padding: 12px; border-radius: 10px; white-space: pre-wrap; word-break: break-all; min-height: 60px; }
      .row { margin: 8px 0; }
      label { display:inline-block; width: 120px; color:#aaa; }
    </style>
  </head>
  <body>
    <h1>InstaPay window.upi — test dApp</h1>

    <div class="row"><button id="detect">Detect wallet</button></div>
    <div class="row"><button id="connect">Connect</button> <button id="disconnect">Disconnect</button></div>

    <div class="row"><label>Payee UPI ID</label><input id="payee" placeholder="9315458767@ipay" size="24" /></div>
    <div class="row"><label>Amount (₹)</label><input id="amount" type="number" value="1" size="8" /></div>
    <div class="row"><button id="pay">Pay</button></div>

    <h3>Output</h3>
    <pre id="out">—</pre>

    <script>
      const out = document.getElementById('out');
      const log = (label, v) => { out.textContent = label + '\n' + (typeof v === 'string' ? v : JSON.stringify(v, null, 2)); };

      const waitForUpi = () =>
        new Promise((resolve) => {
          if (window.upi?.isInstaPay) return resolve(window.upi);
          window.addEventListener('upi#initialized', () => resolve(window.upi), { once: true });
          setTimeout(() => resolve(window.upi), 1500);
        });

      document.getElementById('detect').onclick = async () => {
        const upi = await waitForUpi();
        log('Detect', { installed: !!upi?.isInstaPay });
      };

      document.getElementById('connect').onclick = async () => {
        try {
          const upi = await waitForUpi();
          upi.on('disconnect', () => log('Event', 'disconnect fired'));
          const acc = await upi.connect();
          log('Connected', acc);
        } catch (e) { log('Connect error', e); }
      };

      document.getElementById('disconnect').onclick = async () => {
        try { await window.upi.disconnect(); log('Disconnected', 'ok'); }
        catch (e) { log('Disconnect error', e); }
      };

      document.getElementById('pay').onclick = async () => {
        try {
          const payeeUpiId = document.getElementById('payee').value.trim();
          const amount = Number(document.getElementById('amount').value);
          const res = await window.upi.pay({ payeeUpiId, amount, note: 'test payment', merchantName: 'Test dApp' });
          log('Payment result', res);
        } catch (e) { log('Payment error', e); }
      };
    </script>
  </body>
</html>
